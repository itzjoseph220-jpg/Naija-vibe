<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naija Vibe 🇳🇬</title>
<link rel="manifest" href="manifest.json">
<style>
    * { margin: 0; padding: 0; }
  body { font-family: -apple-system, Arial; background: #0A0A0A; color: #E0E0E0; padding-bottom: 70px; }
  .header { background: #008751; padding: 14px 16px; font-weight: 800; font-size: 20px; color: white; position: sticky; top: 0; }
  .create-post { background: #1A1A1A; margin: 10px; padding: 12px; border-radius: 12px; display: flex; gap: 10px; }
  .avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; }
  .post-input { flex: 1; background: #222; border: none; padding: 10px 14px; border-radius: 20px; color: white; }
  .empty-state { text-align: center; padding: 60px 20px; color: #666; }
  .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
  .nav a { color: #888; text-decoration: none; text-align: center; font-size: 11px; }
  .nav a.active { color: #008751; }
</style>
</head>
<body>
<div class="header">Naija Vibe</div>

<div class="create-post">
  <div class="avatar"></div>
  <input class="post-input" placeholder="What's on your mind?" readonly>
</div>

<div class="empty-state">
  <h3>Welcome to Naija Vibe</h3>
  <p>Start following people to see posts</p>
</div>

<div class="nav">
  <a href="index.html" class="active">🏠<br>Home</a>
  <a href="pages.html">👤<br>Profile</a>
  <a href="dashboard.html">📊<br>Dashboard</a>
</div>

<script src="sw.js"></script>
</body>
</html>
