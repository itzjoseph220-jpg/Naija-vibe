<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Naija-vibe</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f0f2f5}
.fb-header{background:#fff;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 2px rgba(0,0,0,.1);position:sticky;top:0;z-index:100;gap:10px}
.fb-logo{font-weight:800;color:#0866ff;font-size:22px}
.fb-search{background:#f0f2f5;padding:8px 12px;border-radius:20px;display:flex;align-items:center;flex:1;max-width:300px}
.fb-search input{border:none;background:transparent;outline:none;width:100%}
.fb-icons{display:flex;gap:8px}
.fb-icon{width:36px;height:36px;background:#e4e6eb;border-radius:50%;display:flex;align-items:center;justify-content:center}
.pages-btn{background:#0866ff;color:#fff;padding:8px 14px;border-radius:20px;text-decoration:none;font-size:13px;font-weight:700}
.install-banner{background:#0866ff;color:#fff;padding:10px;display:flex;justify-content:space-between;align-items:center}
.install-btn{background:#fff;color:#0866ff;border:none;padding:6px 12px;border-radius:6px;font-weight:700}
.main{max-width:680px;margin:0 auto;padding:10px}
.cover-wrap{position:relative}
#coverImg{width:100%;height:200px;object-fit:cover;border-radius:8px 8px 0 0;background:#ddd}
.profile-row{display:flex;align-items:flex-end;gap:12px;padding:0 16px;margin-top:-30px;position:relative}
.profile-avatar{width:90px;height:90px;border-radius:50%;border:4px solid #fff;background:#0866ff;color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;overflow:hidden}
.profile-info h2{font-size:20px;font-weight:700}
.profile-info p{font-size:13px;color:#65676b}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.1);margin:8px 0;padding:12px}
.create{display:flex;gap:10px;align-items:center;border-bottom:1px solid #e4e6eb;padding-bottom:10px}
.avatar{width:40px;height:40px;border-radius:50%;background:#0866ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.create-input{flex:1;background:#f0f2f5;border-radius:20px;padding:10px 14px;border:none;outline:none}
.create-actions{display:flex;justify-content:space-around;padding-top:10px}
.action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:6px}
</style>
</head>
<body>

<header class="fb-header">
<div class="fb-logo">naija-vibe</div>
<div class="fb-search"><span style="margin-right:6px">🔍</span><input placeholder="Search Naija-vibe"></div>
<a href="pages.html" class="pages-btn">Pages</a>
<div class="fb-icons"><div class="fb-icon">➕</div><div class="fb-icon">💬</div><div class="fb-icon">🔔</div></div>
</header>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
<div><b>📱 Download Naija-vibe App</b><div style="font-size:12px;opacity:.9">Install like Facebook, use offline!</div></div>
<button class="install-btn" id="installBtn">Install</button>
</div>

<div class="main">
<!-- COVER + PROFILE -->
<div style="background:#fff;padding-bottom:12px;border-radius:0 0 8px 8px;box-shadow:0 1px 2px rgba(0,0,0,.1)">
<div class="cover-wrap">
<img id="coverImg" src=https://images.unsplash.com/photo-1518837695005-2083093ee35b?w=680&h=200&fit=crop" style="display:block;width:100%">
<div style="display:none"><input type="file" id="coverInput" accept="image/*"></div>
</div>
<div class="profile-row">
<div class="profile-avatar" id="profileAvatar">J</div>
<div class="profile-info"><h2>itzjoseph220</h2><p>Welcome to Naija-vibe! 🇳🇬</p></div>
</div>
<input type="file" id="avatarInput" accept="image/*" style="display:none">
</div>

<div class="card">
<div class="create">
<div class="avatar" id="createAvatar">J</div>
<div class="create-input" onclick="openComposer()">What's on your mind, Joseph?</div>
</div>
<div class="create-actions">
<div class="action" onclick="openComposer()"><span>📷</span> Photo</div>
<div class="action"><span>😊</span> Feeling</div>
<div class="action"><span>📍</span> Location</div>
</div>
</div>

<div id="posts"></div>
</div>

<script>
// Simple demo
function openComposer(){alert('Composer - Add post feature coming!')}
</script>
</body>
</html>
