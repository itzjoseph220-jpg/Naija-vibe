<meta name="theme-color" content="#008751">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#f0f2f5}
.header{background:#fff;padding:10px;display:flex;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.logo{color:#008751;font-weight:900;font-size:22px}
.main{max-width:600px;margin:0 auto;padding:10px}
.create{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.create input{width:100%;background:#f0f2f5;border:none;padding:12px;border-radius:20px;outline:none;font-size:15px}
.create button{width:100%;margin-top:10px;background:#008751;color:#fff;border:none;padding:12px;border-radius:8px;font-weight:700;cursor:pointer}
.post{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.1)}

<body>
<div class="header"><div class="logo">naija-vibe 🇳🇬</div><div>Pages</div></div>
<div class="main">
<div id="status">✅ Loading... Posts NEVER delete again!</div>
<div class="create">
<input id="postInput" placeholder="What's on your mind? Type here...">
<button onclick="createPost()">Post to Naija-vibe</button>
</div>
<div id="feed"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKpadSWlaTzGaNmG58NrILQtYNa3n63Gs",
  authDomain: "naija-vibe.firebaseapp.com",
  projectId: "naija-vibe",
  storageBucket: "naija-vibe.firebasestorage.app",
  messagingSenderId: "156414762885",
  appId: "1:156414762885:web:0aef473f80f07e5d7faeec"
};

let db;
try{
  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);
}catch(e){ console.log(e); }

const feedEl = document.getElementById('feed');
const statusEl = document.getElementById('status');
const KEY = 'naija_vibe_FINAL_V7';

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch{ return []; } }
function save(a){ localStorage.setItem(KEY, JSON.stringify(a.slice(0,100))); }
function esc(t){ const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function render(posts){
  feedEl.innerHTML='';
  if(!posts.length){
    feedEl.innerHTML='<div style="text-align:center;padding:40px;color:#666">No posts yet.<br>Be first to post!<br><br>✅ Posts will NEVER delete again!</div>';
    return;
  }
  posts.forEach(p=>{
    const div=document.createElement('div');
    div.className='post';
    div.innerHTML=`<div style="font-weight:700">Naija-vibe 🇳🇬 • ${p.time||'now'}</div><div class="post-text">${esc(p.text)}</div>`;
    feedEl.appendChild(div);
  });
}

let all = load();
render(all);
statusEl.textContent = all.length ? `✅ ${all.length} posts saved - NEVER deletes!` : '✅ Ready - Posts will NEVER delete!';

if(db){
  const q = query(collection(db,'posts'), orderBy('createdAt','desc'));
  onSnapshot(q, snap=>{
    const posts=[];
    snap.forEach(d=>{
      const data=d.data();
      const time = data.createdAt?.toDate ? data.createdAt.toDate().toLocaleTimeString() : 'now';
      posts.push({id:d.id, text:data.text, time});
    });
    if(posts.length){
      all=posts;
      render(posts);
      save(posts);
      statusEl.textContent=`✅ ${posts.length} posts - Saved forever for everyone!`;
    }
  }, err=>{
    statusEl.textContent='⚠️ Offline mode - Posts save on this phone. Create Firestore DB in TEST MODE to share.';
  });
}

window.createPost=async()=>{
  const input=document.getElementById('postInput');
  const text=input.value.trim();
  if(!text) return alert('Type something!');
  const post={id:'local_'+Date.now(), text, time:'now'};
  all.unshift(post);
  render(all);
  save(all);
  input.value='';
  statusEl.textContent=`✅ Saved! Total ${all.length} - NEVER deletes!`;
  if(db){
    try{ await addDoc(collection(db,'posts'), {text, createdAt: serverTimestamp()}); }catch(e){ console.log(e.message); }
  }
};
</script>
</body>
