
<!DOCTYPE html>
<html lang="en">
<head><!-- PLAYABLE_TOUCH_PATCH_V1 --><script>
(function() {
  if (window.__playableTouchPatchInstalled) return;
  window.__playableTouchPatchInstalled = true;
  var origAdd = EventTarget.prototype.addEventListener;
  var blockedTypes = { touchstart: 1, touchmove: 1, wheel: 1 };
  EventTarget.prototype.addEventListener = function(type, listener, options) {
    if (blockedTypes[type]) {
      if (options === undefined || options === null) {
        options = { passive: true };
      } else if (typeof options === 'boolean') {
        options = { capture: options, passive: true };
      } else {

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naija-vibe - Connect with Naija</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Roboto',Segoe UI, Helvetica, Arial, sans-serif}
body{background:#f0f2f5;color:#050505}
.fb-header{position:sticky;top:0;z-index:100;background:#fff;display:flex;align-items:center;justify-content:space-between;padding:8px 12px;box-shadow:0 1px 2px rgba(0,0,0,.1);gap:10px}
.fb-logo{font-size:28px;font-weight:800;color:#0866ff;letter-spacing:-1px;white-space:nowrap}
.fb-search{flex:1;max-width:240px;background:#f0f2f5;border-radius:20px;padding:8px 12px;display:flex;align-items:center}
.fb-search input{border:none;background:transparent;outline:none;width:100%;font-size:14px}
.fb-icons{display:flex;gap:8px}
.fb-icon{width:40px;height:40px;background:#e4e6eb;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.main{max-width:680px;margin:0 auto;padding:8px 0 70px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 2px rgba(0,0,0,.1);margin:8px 8px;padding:12px}
.create-top{display:flex;gap:10px;align-items:center;border-bottom:1px solid #e4e6eb;padding-bottom:12px;margin-bottom:8px}
.avatar{width:40px;height:40px;border-radius:50%;background:#0866ff;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.create-input{flex:1;background:#f0f2f5;border-radius:20px;padding:10px 14px;border:none;outline:none;font-size:16px;cursor:pointer}
.create-actions{display:flex;justify-content:space-around;padding-top:4px}
.action{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;color:#65676b}
.action:hover{background:#f0f2f5}
.post-head{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.post-info{flex:1}
.post-name{font-weight:600;font-size:15px}
.post-time{font-size:12px;color:#65676b;display:flex;align-items:center;gap:4px}
.post-text{font-size:15px;line-height:1.4;margin-bottom:10px;white-space:pre-wrap}
.post-img{width:100%;border-radius:8px;margin-top:6px;max-height:500px;object-fit:cover;background:#f0f2f5}
.post-stats{display:flex;justify-content:space-between;padding:10px 0;color:#65676b;font-size:13px;border-bottom:1px solid #e4e6eb}
.post-buttons{display:flex;justify-content:space-around;padding:4px 0 0}
.p-btn{flex:1;display:flex;justify-content:center;align-items:center;gap:6px;padding:8px;border-radius:6px;font-weight:600;color:#65676b;font-size:14px;cursor:pointer;user-select:none}
.p-btn:hover{background:#f0f2f5}
.p-btn.liked{color:#0866ff}
.composer{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end}
.composer.active{display:flex}
.composer-box{background:#fff;width:100%;max-width:680px;margin:0 auto;border-radius:16px 16px 0 0;padding:16px;max-height:90vh;overflow:auto;animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.composer-header{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e4e6eb;padding-bottom:12px;margin-bottom:12px}
.composer-header h3{font-size:18px}
.close-btn{width:36px;height:36px;background:#e4e6eb;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer}
.textarea{width:100%;min-height:100px;border:none;outline:none;font-size:18px;resize:none}
.preview-wrap{position:relative;margin-top:10px;display:none}
.preview-wrap img{width:100%;border-radius:8px;max-height:300px;object-fit:cover}
.remove-img{position:absolute;top:8px;right:8px;background:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 4px rgba(0,0,0,.2);cursor:pointer;font-weight:700}
.post-btn-full{width:100%;background:#0866ff;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:600;margin-top:12px;cursor:pointer}
.post-btn-full:disabled{background:#e4e6eb;color:#bcc0c4}
.upload-label{cursor:pointer}
input[type=file]{display:none}
.comment-box{display:none;margin-top:10px;border-top:1px solid #e4e6eb;padding-top:10px}
.comment-input-row{display:flex;gap:8px;margin-top:8px}
.comment-input{flex:1;background:#f0f2f5;border:none;border-radius:20px;padding:8px 12px;outline:none}
</style>
</head>
<body>
<header class="fb-header">
<div class="fb-logo">naija-vibe</div>
<div class="fb-search"><span style="margin-right:6px">🔍</span><input placeholder="Search Naija-vibe"></div>
<div class="fb-icons"><div class="fb-icon">➕</div><div class="fb-icon">💬</div><div class="fb-icon">🔔</div></div>
</header>

<div class="main">
<div class="card">
<div class="create-top">
<div class="avatar">J</div>
<div class="create-input" onclick="openComposer()">What's on your mind, Joseph?</div>
</div>
<div class="create-actions">
<div class="action" onclick="openComposer()"><span>📷</span> Photo</div>
<div class="action"><span>😊</span> Feeling</div>
<div class="action"><span>📍</span> Location</div>
</div>
</div>

<div id="feed"></div>
</div>

<div class="composer" id="composer" onclick="if(event.target==this)closeComposer()">
<div class="composer-box">
<div class="composer-header"><h3>Create post</h3><div class="close-btn" onclick="closeComposer()">✕</div></div>
<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
<div class="avatar">J</div><div><div style="font-weight:600">itzjoseph220</div><div style="font-size:12px;color:#65676b;background:#e4e6eb;padding:2px 6px;border-radius:4px;display:inline-block">🌎 Public</div></div>
</div>
<textarea id="postText" class="textarea" placeholder="What's on your mind? Share the vibe..."></textarea>
<div class="preview-wrap" id="previewWrap">
<img id="previewImg"><div class="remove-img" onclick="removeImage()">✕</div>
</div>
<div style="border:1px solid #ccd0d5;border-radius:8px;padding:10px;margin-top:12px;display:flex;justify-content:space-between;align-items:center">
<span style="font-weight:500;font-size:14px">Add to your post</span>
<label class="upload-label"><span style="font-size:20px">🖼️</span><input type="file" id="imageInput" accept="image/*" onchange="handleImage(this)"></label>
</div>
<button id="postBtn" class="post-btn-full" disabled onclick="createPost()">Post</button>
</div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem('naija_posts_v2')||'null') || [
{name:'Amaka',letter:'A',time:'2m ago',text:'First vibe on Naija-vibe! 🎉 🇳🇬 Who dey here?',likes:12,image:null,comments:['Welcome! 🔥'],liked:false},
{name:'Tunde',letter:'T',time:'10m ago',text:'Port Harcourt to the world! Building the next big thing.',likes:28,image:null,comments:[],liked:false},
{name:'Chioma',letter:'C',time:'1h ago',text:'Naija no dey carry last! Check out my new design 😍',likes:45,image:'https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=600',comments:['Fine fine!'],liked:false}
];
let selectedImage = null;

const feed = document.getElementById('feed');
const postText = document.getElementById('postText');
const postBtn = document.getElementById('postBtn');

postText.addEventListener('input',()=>{postBtn.disabled = !postText.value.trim() && !selectedImage;});

function save(){localStorage.setItem('naija_posts_v2',JSON.stringify(posts))}
function openComposer(){document.getElementById('composer').classList.add('active');postText.focus()}
function closeComposer(){document.getElementById('composer').classList.remove('active');postText.value='';removeImage();postBtn.disabled=true}

function handleImage(input){
 if(input.files && input.files[0]){
  const reader=new FileReader();
  reader.onload=e=>{selectedImage=e.target.result;document.getElementById('previewImg').src=selectedImage;document.getElementById('previewWrap').style.display='block';postBtn.disabled=!postText.value.trim() && !selectedImage};
  reader.readAsDataURL(input.files[0]);
 }
}
function removeImage(){selectedImage=null;document.getElementById('previewWrap').style.display='none';document.getElementById('imageInput').value='';postBtn.disabled=!postText.value.trim()}

function createPost(){
 const text=postText.value.trim();
 if(!text && !selectedImage) return;
 posts.unshift({name:'itzjoseph220',letter:'J',time:'Just now',text:text,likes:0,image:selectedImage,comments:[],liked:false});
 save();render();closeComposer();
}

function render(){
 feed.innerHTML='';
 posts.forEach((p,i)=>{
  const div=document.createElement('div');div.className='card';
  div.innerHTML=`
  <div class="post-head">
   <div class="avatar" style="background:${'#'+Math.floor(Math.random()*0xffffff).toString(16).padEnd(6,'0')}">${p.letter}</div>
   <div class="post-info"><div class="post-name">${p.name}</div><div class="post-time">${p.time} • 🌎</div></div>
   <div style="font-size:20px;cursor:pointer">⋯</div>
  </div>
  <div class="post-text">${p.text}</div>
  ${p.image?`<img class="post-img" src="${p.image}">`:''}
  <div class="post-stats"><span>❤️ ${p.likes>0?p.likes+' likes':''} ${p.comments.length? '• '+p.comments.length+' comments':''}</span><span></span></div>
  <div class="post-buttons">
   <div class="p-btn ${p.liked?'liked':''}" onclick="like(${i})"><span>${p.liked?'❤️':'🤍'}</span> Like</div>
   <div class="p-btn" onclick="toggleComment(${i})"><span>💬</span> Comment</div>
   <div class="p-btn" onclick="sharePost(${i})"><span>↗️</span> Share</div>
  </div>
  <div class="comment-box" id="cbox-${i}">
   ${p.comments.map(c=>`<div style="background:#f0f2f5;padding:8px 12px;border-radius:16px;margin:6px 0;font-size:14px">${c}</div>`).join('')}
   <div class="comment-input-row"><div class="avatar" style="width:32px;height:32px;font-size:14px">J</div><input class="comment-input" id="cinput-${i}" placeholder="Write a comment..." onkeydown="if(event.key==='Enter')addComment(${i})"></div>
  </div>`;
  feed.appendChild(div);
 });
}
function like(i){posts[i].liked=!posts[i].liked;posts[i].likes+=posts[i].liked?1:-1;save();render()}
function toggleComment(i){const box=document.getElementById(`cbox-${i}`);box.style.display=box.style.display==='block'?'none':'block'}
function addComment(i){const inp=document.getElementById(`cinput-${i}`);const val=inp.value.trim();if(!val)return;posts[i].comments.push(val);save();render();setTimeout(()=>{document.getElementById(`cbox-${i}`).style.display='block'},100)}
function sharePost(i){if(navigator.share){navigator.share({title:'Naija-vibe',text:posts[i].text,url:location.href})}else{navigator.clipboard.writeText(location.href);alert('Link copied! Share am for WhatsApp!')}}
render();
</script>
</body>
</html>
