<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Naija-vibe</title>
<style>
body{font-family:sans-serif;background:#f0f2f5;margin:0}
.header{background:#008751;color:white;padding:15px;font-weight:bold;font-size:22px;text-align:center;position:sticky;top:0}
.container{max-width:500px;margin:auto;padding:10px}
.card{background:white;border-radius:15px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
textarea{width:95%;border:1px solid #ddd;border-radius:10px;padding:10px}
.btn{background:#008751;color:white;border:none;padding:12px;border-radius:25px;margin-top:10px;width:100%;font-weight:bold;font-size:16px}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.avatar{width:40px;height:40px;background:#008751;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold}
.actions{display:flex;gap:20px;margin-top:12px;color:#555;font-size:14px}
</style>
</head>
<body>
<div class="header">Naija-vibe 🇳🇬</div>
<div class="container">
<div class="card">
<div class="post-head"><div class="avatar">J</div><b>itzjoseph220</b></div>
<textarea id="postText" placeholder="What's on your mind? Share the vibe..."></textarea>
<button class="btn" onclick="createPost()">Post Vibe</button>
</div>
<div id="feed">
<div class="card"><div class="post-head"><div class="avatar">A</div><b>Amaka</b>. 2m ago</div><p>First vibe on Naija-vibe! 🔥🇳🇬 Who dey here?</p><div class="actions"><span onclick="like(this)">❤️ 12 Likes</span><span>💬 Comment</span><span>↗️ Share</span></div></div>
<div class="card"><div class="post-head"><div class="avatar">T</div><b>Tunde</b>. 10m ago</div><p>Port Harcourt to the world! Building the next big thing.</p><div class="actions"><span onclick="like(this)">❤️ 45 Likes</span><span>💬 Comment</span><span>↗️ Share</span></div></div>
</div>
</div>
<script>
function createPost(){
let t=document.getElementById('postText').value;
if(!t)return;
let f=document.getElementById('feed');
let d=document.createElement('div');
d.className='card';
d.innerHTML=`<div class="post-head"><div class="avatar">J</div><b>You</b>. now</div><p>${t}</p><div class="actions"><span onclick="like(this)">❤️ 0 Likes</span><span>💬 Comment</span><span>↗️ Share</span></div>`;
f.prepend(d);
document.getElementById('postText').value='';
}
function like(e){
let n=parseInt(e.innerText.match(/\d+/)[0])+1;
e.innerText='❤️ '+n+' Likes';
}
</script>
</body>
</html>
