<!DOCTYPE html>
<html>
<head>
<title>Pages - Naija-vibe</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.fb-header{background:#fff;padding:10px 15px;display:flex;align-items:center;box-shadow:0 1px 2px rgba(0,0,0,.1);position:sticky;top:0;z-index:10}
.fb-logo{font-weight:800;color:#0866ff;font-size:20px}
.main{max-width:680px;margin:0 auto;padding:10px}
.card{background:#fff;border-radius:8px;padding:15px;margin-bottom:10px;box-shadow:0 1px 2px rgba(0,0,0,.1)}
.btn{background:#0866ff;color:#fff;border:none;padding:10px 15px;border-radius:20px;font-weight:700;width:100%;margin-top:10px}
.input{width:100%;padding:10px;border:1px solid #ddd;border-radius:8px;margin:5px 0;box-sizing:border-box}
.page-item{display:flex;gap:10px;align-items:center;padding:10px;border-bottom:1px solid #eee}
.page-avatar{width:50px;height:50px;background:#0866ff;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:20px}
</style>
</head>
<body>
<div class="fb-header">
<div class="fb-logo"><a href="index.html" style="text-decoration:none;color:#0866ff">← naija-vibe</a> / Pages</div>
</div>
<div class="main">
<div class="card">
<h3>Create New Page</h3>
<input id="pName" class="input" placeholder="Page Name e.g Naija Music">
<input id="pCat" class="input" placeholder="Category e.g Music, Comedy, News">
<button class="btn" onclick="createPage()">Create Page</button>
</div>
<div class="card" id="pagesList">
<h3>All Pages</h3>
<div id="list"></div>
</div>
</div>
<script>
let pages = JSON.parse(localStorage.getItem('nv_pages')||'[{"name":"Naija Music Hub","cat":"Music","followers":1200},{"name":"Naija Comedy","cat":"Comedy","followers":5400},{"name":"Football News NG","cat":"Sports","followers":3200}]');
function render(){
let h='';
pages.forEach((p,i)=>{
h+=`<div class="page-item"><div class="page-avatar">${p.name[0]}</div><div style="flex:1"><b>${p.name}</b><br><small>${p.cat} • ${p.followers} followers</small></div><button onclick="follow(${i})" style="background:#e4e6eb;border:none;padding:6px 12px;border-radius:20px;font-weight:700">Follow</button></div>`
});
document.getElementById('list').innerHTML=h;
}
function createPage(){
let n=document.getElementById('pName').value;
let c=document.getElementById('pCat').value;
if(!n) return alert('Enter Page Name');
pages.unshift({name:n,cat:c||'General',followers:1});
localStorage.setItem('nv_pages',JSON.stringify(pages));
document.getElementById('pName').value='';document.getElementById('pCat').value='';
render();
alert('Page Created! ✅');
}
function follow(i){pages[i].followers++;localStorage.setItem('nv_pages',JSON.stringify(pages));render();}
render();
</script>
</body>
</html>
